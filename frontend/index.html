<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Sinh viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand">🎓 Văn Lang</a>
            <div class="navbar-nav me-auto">
                <a class="nav-link active" href="index.html">Sinh viên</a>
                <a class="nav-link" href="grades.html">Điểm số</a>
                <a class="nav-link" href="logs.html">Nhật ký</a>
            </div>
            <span class="navbar-text me-3 text-light" id="userDisplay"></span>
            <button onclick="logout()" class="btn btn-outline-danger btn-sm">Đăng xuất</button>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col-md-4"><div class="card p-3 bg-primary text-white text-center"><h6>Tổng SV</h6><h2 id="totalCount">0</h2></div></div>
            <div class="col-md-4"><div class="card p-3 bg-success text-white text-center"><h6>Ngành IT</h6><h2 id="itCount">0</h2></div></div>
            <div class="col-md-4"><div class="card p-3 bg-info text-white text-center"><h6>Ngành Khác</h6><h2 id="otherCount">0</h2></div></div>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card p-4 shadow-sm">
                    <h5>Thêm / Sửa Sinh viên</h5>
                    <input id="name" class="form-control mb-2" placeholder="Họ và tên">
                    <input id="email" class="form-control mb-2" placeholder="Email">
                    <select id="major" class="form-select mb-3">
                        <option value="">Chọn ngành</option><option>IT</option><option>Marketing</option><option>Business</option><option>Design</option><option>Piano</option><option>Lawyer</option><option>Logistic</option>
                    </select>
                    <button onclick="addStudent()" id="saveBtn" class="btn btn-primary w-100">Lưu thông tin</button>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card p-4 shadow-sm">
                    <div class="d-flex justify-content-between mb-3">
                        <h5>Danh sách</h5>
                        <input type="text" id="searchInput" class="form-control w-50" placeholder="🔍 Tìm kiếm..." oninput="filterStudents()">
                    </div>
                    <table class="table align-middle">
                        <thead class="table-light"><tr><th>Tên</th><th>Email</th><th>Ngành</th><th>Thao tác</th></tr></thead>
                        <tbody id="studentTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem("isLoggedIn") !== "true") window.location.href = "login.html";
        document.getElementById("userDisplay").innerText = "Chào, " + localStorage.getItem("username");

        const API = "https://cacnentangphattrienphanmem-21o2.onrender.com";
        let allStudents = [], editingId = null;

        function logout() { localStorage.clear(); window.location.href = "login.html"; }

        async function loadStudents() {
            const res = await fetch(API + "/students");
            allStudents = await res.json();
            updateStats();
            displayTable(allStudents);
        }

        function displayTable(data) {
            const table = document.getElementById("studentTable");
            table.innerHTML = data.map(s => `
                <tr>
                    <td><strong>${s.name}</strong></td>
                    <td>${s.email}</td>
                    <td><span class="badge bg-secondary">${s.major}</span></td>
                    <td>
                        <button class="btn btn-sm btn-warning" onclick="editStudent('${s.id}','${s.name}','${s.email}','${s.major}')">Sửa</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteStudent('${s.id}')">Xóa</button>
                    </td>
                </tr>
            `).join('');
        }

        function updateStats() {
            document.getElementById("totalCount").innerText = allStudents.length;
            const it = allStudents.filter(s => s.major === "IT").length;
            document.getElementById("itCount").innerText = it;
            document.getElementById("otherCount").innerText = allStudents.length - it;
        }

        function filterStudents() {
            const t = document.getElementById("searchInput").value.toLowerCase();
            const filtered = allStudents.filter(s => s.name.toLowerCase().includes(t) || s.email.toLowerCase().includes(t));
            displayTable(filtered);
        }

        async function addStudent() {
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const major = document.getElementById("major").value;
            if(!name || !email || !major) return Swal.fire("Lỗi", "Điền đủ thông tin", "error");

            const method = editingId ? "PUT" : "POST";
            const url = editingId ? `${API}/students/${editingId}` : `${API}/students`;

            await fetch(url, {
                method: method,
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({name, email, major})
            });
            
            Swal.fire("Thành công!", "Dữ liệu đã được lưu", "success");
            resetForm();
            loadStudents();
        }

        function editStudent(id, n, e, m) {
            editingId = id;
            document.getElementById("name").value = n;
            document.getElementById("email").value = e;
            document.getElementById("major").value = m;
            document.getElementById("saveBtn").innerText = "Cập nhật";
            document.getElementById("saveBtn").className = "btn btn-warning w-100";
        }

        async function deleteStudent(id) {
            const res = await Swal.fire({ title: 'Xóa sinh viên?', showCancelButton: true, confirmButtonText: 'Xóa', confirmButtonColor: '#d33' });
            if (res.isConfirmed) {
                await fetch(`${API}/students/${id}`, {method: "DELETE"});
                loadStudents();
            }
        }

        function resetForm() {
            editingId = null;
            document.querySelectorAll("input, select").forEach(i => i.value = "");
            document.getElementById("saveBtn").innerText = "Lưu thông tin";
            document.getElementById("saveBtn").className = "btn btn-primary w-100";
        }

        loadStudents();
    </script>
</body>
</html>
