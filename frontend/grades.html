<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Điểm số - SMS Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 15px; border: none; }
        .table thead { background-color: #f1f5f9; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand">🎓 Văn Lang</a>
            <div class="navbar-nav me-auto">
                <a class="nav-link" href="index.html">Sinh viên</a>
                <a class="nav-link active" href="grades.html">Điểm số</a>
                <a class="nav-link" href="logs.html">Nhật ký</a>
            </div>
            <button onclick="logout()" class="btn btn-outline-danger btn-sm">Đăng xuất</button>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card p-4 shadow-sm mb-4">
                    <h5 id="formTitle">🎯 Nhập điểm môn học</h5>
                    <hr>
                    <div class="mb-3">
                        <label class="small fw-bold text-primary">Chọn Sinh viên</label>
                        <select id="student_id" class="form-select">
                            <option value="">-- Chọn sinh viên trong DS --</option>
                        </select>
                        <div class="small text-muted mt-1">* Dữ liệu lấy từ trang Sinh viên</div>
                    </div>
                    <div class="mb-3">
                        <label class="small fw-bold">Môn học</label>
                        <input id="subject" class="form-control" placeholder="Ví dụ: Lập trình Web">
                    </div>
                    <div class="row mb-4">
                        <div class="col-6">
                            <label class="small fw-bold">Điểm (0-10)</label>
                            <input id="score" type="number" step="0.1" class="form-control" placeholder="0.0">
                        </div>
                        <div class="col-6">
                            <label class="small fw-bold">Số tín chỉ</label>
                            <input id="credits" type="number" class="form-control" placeholder="0">
                        </div>
                    </div>
                    <button onclick="saveGrade()" id="btnSave" class="btn btn-primary w-100 fw-bold py-2">Lưu điểm số</button>
                    <button onclick="resetForm()" id="btnCancel" class="btn btn-link w-100 btn-sm d-none mt-2 text-secondary">Hủy chỉnh sửa</button>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card p-4 shadow-sm">
                    <h5 class="mb-3">📊 Bảng điểm tổng hợp</h5>
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                                <tr>
                                    <th>Sinh viên</th>
                                    <th>Môn học</th>
                                    <th class="text-center">Điểm</th>
                                    <th>Xếp loại</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="gradeTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://docker-wgqz.onrender.com";
        let editingId = null;

        // 1. Tải danh sách sinh viên để đổ vào Dropdown
        async function loadStudentsToSelect() {
            try {
                const res = await fetch(API + "/students");
                const students = await res.json();
                const select = document.getElementById("student_id");
                
                // Giữ lại option đầu tiên
                select.innerHTML = '<option value="">-- Chọn sinh viên trong DS --</option>';
                students.forEach(s => {
                    const option = document.createElement("option");
                    option.value = s.name; // Lưu tên sinh viên
                    option.textContent = `${s.name} (${s.major})`;
                    select.appendChild(option);
                });
            } catch (e) { console.error("Không thể tải danh sách sinh viên"); }
        }

        // 2. Tính toán xếp loại
        function getRank(score) {
            if (score >= 8.5) return { text: "Giỏi", color: "text-success fw-bold" };
            if (score >= 7.0) return { text: "Khá", color: "text-primary fw-bold" };
            if (score >= 5.0) return { text: "Trung bình", color: "text-warning fw-bold" };
            return { text: "Yếu", color: "text-danger fw-bold" };
        }

        // 3. Hiển thị bảng điểm
        async function loadGrades() {
            const res = await fetch(API + "/grades");
            const data = await res.json();
            const table = document.getElementById("gradeTable");
            
            table.innerHTML = data.map(g => {
                const rank = getRank(g.score);
                return `
                <tr>
                    <td><div class="fw-bold">${g.student_id}</div></td>
                    <td>${g.subject} <span class="text-muted small">(${g.credits} tín)</span></td>
                    <td class="text-center"><span class="badge ${g.score >= 5 ? 'bg-success' : 'bg-danger'}">${g.score}</span></td>
                    <td><span class="${rank.color}">${rank.text}</span></td>
                    <td>
                        <button class="btn btn-sm btn-warning" onclick="editGrade('${g.id}','${g.student_id}','${g.subject}',${g.score},${g.credits})">Sửa</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteGrade('${g.id}')">Xóa</button>
                    </td>
                </tr>
            `}).join('');
        }

        // 4. Lưu hoặc Cập nhật
        async function saveGrade() {
            const student_id = document.getElementById("student_id").value;
            const subject = document.getElementById("subject").value.trim();
            const score = parseFloat(document.getElementById("score").value);
            const credits = parseInt(document.getElementById("credits").value);

            if (!student_id || !subject || isNaN(score) || isNaN(credits)) {
                return Swal.fire("Lỗi", "Vui lòng nhập đầy đủ thông tin", "warning");
            }
            if (score < 0 || score > 10) {
                return Swal.fire("Lỗi", "Điểm phải từ 0 đến 10", "error");
            }

            const method = editingId ? "PUT" : "POST";
            const url = editingId ? `${API}/grades/${editingId}` : `${API}/grades`;

            await fetch(url, {
                method: method,
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ student_id, subject, score, credits })
            });

            Swal.fire("Thành công", "Dữ liệu điểm đã được lưu", "success");
            resetForm();
            loadGrades();
        }

        function editGrade(id, sid, sub, sco, cre) {
            editingId = id;
            document.getElementById("student_id").value = sid;
            document.getElementById("subject").value = sub;
            document.getElementById("score").value = sco;
            document.getElementById("credits").value = cre;

            document.getElementById("formTitle").innerText = "📝 Sửa điểm số";
            document.getElementById("btnSave").innerText = "Cập nhật";
            document.getElementById("btnSave").className = "btn btn-warning w-100 fw-bold py-2";
            document.getElementById("btnCancel").classList.remove("d-none");
        }

        async function deleteGrade(id) {
            const res = await Swal.fire({ title: 'Xác nhận xóa?', showCancelButton: true, confirmButtonColor: '#d33' });
            if (res.isConfirmed) {
                await fetch(`${API}/grades/${id}`, { method: "DELETE" });
                loadGrades();
            }
        }

        function resetForm() {
            editingId = null;
            document.getElementById("student_id").value = "";
            document.getElementById("subject").value = "";
            document.getElementById("score").value = "";
            document.getElementById("credits").value = "";
            document.getElementById("formTitle").innerText = "🎯 Nhập điểm môn học";
            document.getElementById("btnSave").innerText = "Lưu điểm số";
            document.getElementById("btnSave").className = "btn btn-primary w-100 fw-bold py-2";
            document.getElementById("btnCancel").classList.add("d-none");
        }

        function logout() { localStorage.clear(); window.location.href = "login.html"; }

        // Khởi chạy
        loadStudentsToSelect();
        loadGrades();
    </script>
</body>
</html>
