<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' 'unsafe-eval';">
    <title>Đăng ký tài khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f1f5f9; }
        .auth-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-top: 100px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4 card p-4 auth-card">
                <h3 class="text-center mb-4">Đăng ký</h3>
                
                <div class="mb-3">
                    <label class="form-label">Tên đăng nhập</label>
                    <input id="u" class="form-control" placeholder="Nhập username...">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Mật khẩu</label>
                    <input id="p" type="password" class="form-control" placeholder="Nhập mật khẩu...">
                </div>
                
                <button onclick="handleRegister()" class="btn btn-success w-100 py-2">Tạo tài khoản</button>
                
                <div class="text-center mt-3">
                    <p>Đã có tài khoản? <a href="login.html" class="text-decoration-none">Đăng nhập ngay</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://cacnentangphattrienphanmem-21o2.onrender.com";

        async function handleRegister() {
            const username = document.getElementById("u").value;
            const password = document.getElementById("p").value;

            if(!username || !password) {
                alert("Vui lòng điền đầy đủ thông tin!");
                return;
            }

            try {
                const res = await fetch(API + "/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                const data = await res.json();

                if (data.status === "success") {
                    alert("Đăng ký thành công! Đang chuyển hướng sang trang đăng nhập...");
                    // DÒNG LỆNH QUAN TRỌNG NHẤT:
                    window.location.href = "login.html"; 
                } else {
                    alert("Lỗi: " + data.message);
                }
            } catch (error) {
                console.error("Error:", error);
                alert("Không thể kết nối đến Server API!");
            }
        }
    </script>
</body>
</html>
