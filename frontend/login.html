<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập hệ thống</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4 card p-4 shadow-sm border-0" style="border-radius: 15px;">
                <h3 class="text-center mb-4">Đăng nhập</h3>
                <input id="user" class="form-control mb-3" placeholder="Tên đăng nhập">
                <input id="pass" type="password" class="form-control mb-4" placeholder="Mật khẩu">
                <button onclick="handleLogin()" class="btn btn-primary w-100 py-2">Vào hệ thống</button>
                <p class="mt-3 text-center small text-muted">Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
            </div>
        </div>
    </div>
    <script>
        const API = "http://127.0.0.1:8000";
        async function handleLogin() {
            const u = document.getElementById("user").value;
            const p = document.getElementById("pass").value;
            try {
                const res = await fetch(API + "/login", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({username: u, password: p})
                });
                const data = await res.json();
                if (data.status === "success") {
                    localStorage.setItem("isLoggedIn", "true");
                    localStorage.setItem("username", data.username);
                    window.location.href = "index.html";
                } else {
                    alert(data.message || "Lỗi đăng nhập!");
                }
            } catch (e) { alert("Server đang tắt hoặc lỗi kết nối!"); }
        }
    </script>
</body>
</html>
